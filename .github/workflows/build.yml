name: Build

on:
  push:
    branches: [main, master]
    tags:
      - 'v*'
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' && github.ref != 'refs/heads/master' }}

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Read version info
        id: version
        run: |
          VERSION_NAME=$(grep -oP 'versionName\s*=\s*"\K[^"]+' app/build.gradle.kts)
          VERSION_CODE=$(grep -oP 'versionCode\s*=\s*\K\d+' app/build.gradle.kts)
          echo "version_name=${VERSION_NAME}" >> $GITHUB_OUTPUT
          echo "version_code=${VERSION_CODE}" >> $GITHUB_OUTPUT
          echo "Building Oplus Assistant Hook v${VERSION_NAME} (${VERSION_CODE})"

      # Decode signing keystore if the secret is provided. When absent, the release variant
      # falls back to the debug keystore so the workflow still produces an installable APK.
      - name: Decode signing keystore
        id: signing
        env:
          SIGNING_KEYSTORE_BASE64: ${{ secrets.SIGNING_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$SIGNING_KEYSTORE_BASE64" ]; then
            echo "No signing keystore secret configured; release will use the debug keystore."
            echo "keystore_path=" >> $GITHUB_OUTPUT
            exit 0
          fi
          KEYSTORE_PATH="${{ runner.temp }}/release.keystore"
          echo "$SIGNING_KEYSTORE_BASE64" | base64 -d > "$KEYSTORE_PATH"
          echo "keystore_path=${KEYSTORE_PATH}" >> $GITHUB_OUTPUT

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug --stacktrace

      - name: Build release APK
        env:
          RELEASE_STORE_FILE: ${{ steps.signing.outputs.keystore_path }}
          RELEASE_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: |
          if [ -n "${RELEASE_STORE_FILE}" ]; then
            ./gradlew :app:assembleRelease --stacktrace \
              -Prelease.storeFile="${RELEASE_STORE_FILE}" \
              -Prelease.storePassword="${RELEASE_STORE_PASSWORD}" \
              -Prelease.keyAlias="${RELEASE_KEY_ALIAS}" \
              -Prelease.keyPassword="${RELEASE_KEY_PASSWORD}"
          else
            ./gradlew :app:assembleRelease --stacktrace
          fi

      - name: Rename release APK
        id: rename
        run: |
          mkdir -p artifacts
          DEBUG_APK=$(find app/build/outputs/apk/debug -name "*.apk" | head -n1)
          RELEASE_APK=$(find app/build/outputs/apk/release -name "*.apk" | head -n1)
          DEBUG_OUT="artifacts/Oplus-Assistant-Hook_v${{ steps.version.outputs.version_name }}-debug.apk"
          RELEASE_OUT="artifacts/Oplus-Assistant-Hook_v${{ steps.version.outputs.version_name }}.apk"
          cp "$DEBUG_APK" "$DEBUG_OUT"
          cp "$RELEASE_APK" "$RELEASE_OUT"
          echo "debug_apk=${DEBUG_OUT}" >> $GITHUB_OUTPUT
          echo "release_apk=${RELEASE_OUT}" >> $GITHUB_OUTPUT

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: Oplus-Assistant-Hook-debug-v${{ steps.version.outputs.version_name }}
          path: ${{ steps.rename.outputs.debug_apk }}
          if-no-files-found: error

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: Oplus-Assistant-Hook-release-v${{ steps.version.outputs.version_name }}
          path: ${{ steps.rename.outputs.release_apk }}
          if-no-files-found: error

      - name: Upload mapping file (release)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mapping-v${{ steps.version.outputs.version_name }}
          path: app/build/outputs/mapping/release/
          if-no-files-found: ignore

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          draft: false
          prerelease: false
          files: |
            ${{ steps.rename.outputs.release_apk }}
            ${{ steps.rename.outputs.debug_apk }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
